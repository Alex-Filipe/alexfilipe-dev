version: 2
updates:
  # npm dependencies — one grouped PR per week to avoid noise.
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      npm:
        patterns:
          - "*"
    commit-message:
      prefix: "deps"

  # Keep the GitHub Actions used by the pipeline up to date too.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"

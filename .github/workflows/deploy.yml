name: CI/CD

# CI runs on every push and pull request (lint + build).
# CD (deploy to GitHub Pages) runs only when changes land on main.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least-privilege permissions; the deploy job needs pages + id-token.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, without cancelling in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Lint & build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5
